<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lean Helpdesk</title>
    <link rel="icon" type="image/png" href="/assets/logo-blanco.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/check_session.php');
                const result = await response.json();
                if (!result.authenticated) window.location.href = '/login';
                else {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    switchView('mailboxes'); 
                }
            } catch (error) { window.location.href = '/login'; }
        }
        checkAuth();
    </script>
</head>
<body class="bg-gray-100 h-screen overflow-hidden text-black font-sans">

    <div id="loader" class="flex h-screen w-full items-center justify-center bg-gray-100 z-50">
        <p class="text-xl font-semibold animate-pulse text-[#001128]">Verificando acceso...</p>
    </div>

    <div id="dashboard" class="hidden flex h-screen w-full">
        
        <aside class="w-64 bg-[#001128] text-white flex flex-col shadow-xl z-10 shrink-0">
            <div class="h-20 flex items-center justify-center px-4 border-b border-white/10 bg-white/5">
                <img src="/assets/logo-blanco.png" alt="Logo Helpdesk" class="max-h-10 w-auto object-contain">
            </div>
            <nav class="flex-1 p-4 space-y-2 mt-2">
                <button onclick="switchView('mailboxes')" id="nav-mailboxes" class="w-full text-left py-3 px-4 rounded transition duration-200 bg-white/10 text-white font-semibold hover:bg-white/20">
                    Bandejas
                </button>
                <button onclick="switchView('settings')" id="nav-settings" class="w-full text-left py-3 px-4 rounded transition duration-200 text-gray-400 hover:text-white hover:bg-white/5">
                    Configuración
                </button>
            </nav>
            <div class="p-4 border-t border-white/10 flex flex-col items-center">
                <button onclick="logout()" class="w-full text-left px-4 py-3 text-red-400 font-medium hover:bg-white/5 hover:text-red-300 rounded transition duration-200 mb-4">
                    Cerrar Sesión
                </button>
                <p class="text-white text-xs opacity-60 font-light tracking-wide text-center">
                    Lean Helpdesk <br> by <span class="font-semibold text-white/90">Camilo Camargo</span>
                </p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-50 relative">
            
            <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm shrink-0">
                <div class="flex items-center space-x-4">
                    <button id="btn-back" onclick="goBack()" class="hidden text-gray-500 hover:text-[#001128] transition bg-gray-100 p-2 rounded-full">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </button>
                    <h1 id="page-title" class="text-2xl font-bold text-[#001128] truncate">Bandejas de Entrada</h1>
                </div>

                <div class="flex items-center space-x-6 shrink-0">
                    <div class="relative hidden md:block">
                        <input type="text" id="global-search" onkeyup="handleSearch(event)" placeholder="Buscar correo o asunto..." class="bg-gray-100 border border-transparent focus:bg-white focus:border-gray-300 focus:ring-1 focus:ring-[#001128] rounded-full text-sm px-4 py-2 w-64 transition-all focus:outline-none">
                        <svg class="w-4 h-4 text-gray-400 absolute right-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    
                    <div class="flex items-center space-x-3 border-l pl-6 relative">
                        <span class="text-sm font-medium text-gray-600">Admin</span>
                        <div onclick="toggleUserMenu()" class="h-8 w-8 rounded-full bg-[#001128] text-white flex items-center justify-center font-bold cursor-pointer hover:bg-black transition">A</div>
                        
                        <div id="user-menu" class="hidden absolute right-0 top-10 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50 border border-gray-200">
                            <a href="/perfil.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                Mi Perfil
                            </a>
                            <button onclick="logout()" class="w-full text-left block px-4 py-2 text-sm text-red-600 hover:bg-gray-100 flex items-center border-t border-gray-100 mt-1 pt-1">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                                Cerrar Sesión
                            </button>
                        </div>
                    </div>
                </div>
            </header>
            
            <div id="view-mailboxes" class="flex-1 overflow-y-auto p-8">
                <div id="mailboxes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="view-tickets" class="hidden flex-1 overflow-y-auto p-8">
                <div class="mb-6 flex border-b border-gray-200">
                    <button id="tab-open" onclick="setTicketTab('OPEN')" class="py-3 px-6 font-bold text-[#001128] border-b-2 border-[#001128] transition-colors focus:outline-none">
                        Abiertos (<span id="count-open">0</span>)
                    </button>
                    <button id="tab-closed" onclick="setTicketTab('CLOSED')" class="py-3 px-6 font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition-colors focus:outline-none">
                        Cerrados (<span id="count-closed">0</span>)
                    </button>
                </div>
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <ul id="tickets-list" class="divide-y divide-gray-200"></ul>
                </div>
            </div>

            <div id="view-single-ticket" class="hidden flex-1 flex flex-col overflow-hidden bg-gray-100">
                <div class="bg-white border-b px-8 py-4 flex justify-between items-center shrink-0">
                    <div>
                        <h2 id="ticket-subject" class="text-xl font-bold text-gray-800">Cargando...</h2>
                        <p id="ticket-customer" class="text-sm text-gray-500 mt-1">...</p>
                    </div>
                    <button onclick="closeTicket()" class="bg-gray-200 text-gray-700 hover:bg-gray-300 hover:text-red-600 px-4 py-2 rounded text-sm font-medium transition">Marcar como Cerrado</button>
                </div>

                <div id="ticket-messages" class="flex-1 overflow-y-auto p-8 space-y-6"></div>

                <div class="bg-white border-t p-6 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    <form id="replyForm" onsubmit="sendReply(event)">
                        <textarea id="reply-body" rows="4" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-[#001128] focus:ring-1 focus:ring-[#001128] resize-none mb-2" placeholder="Escribe tu respuesta al cliente aquí..." required></textarea>
                        
                        <div class="flex justify-between items-center mt-2">
                            <input type="file" id="reply-attachments" multiple class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-[#001128] hover:file:bg-blue-100 cursor-pointer">
                            <button type="submit" class="bg-[#001128] hover:bg-black text-white px-6 py-2 rounded font-bold transition flex items-center shadow-sm whitespace-nowrap ml-4">
                                <svg class="w-4 h-4 mr-2 -ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                                Enviar Respuesta
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="view-settings" class="hidden flex-1 overflow-y-auto p-8">
                <div id="settings-list" class="max-w-4xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8 mb-8">
                    <div class="flex justify-between items-center mb-6 border-b pb-4">
                        <h2 class="text-lg font-bold text-[#001128]">Bandejas Configuradas</h2>
                        <button onclick="showMailboxForm()" class="bg-[#001128] hover:bg-black text-white px-4 py-2 rounded text-sm font-bold transition">+ Nueva Bandeja</button>
                    </div>
                    <ul id="settings-mailboxes-list" class="divide-y divide-gray-200"></ul>
                </div>

                <div id="settings-form" class="hidden max-w-4xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8">
                    <div class="flex justify-between items-center mb-6 border-b pb-2">
                        <h2 id="form-title" class="text-lg font-bold text-[#001128]">Configurar Bandeja</h2>
                        <button onclick="hideMailboxForm()" class="text-gray-500 hover:text-red-500 text-sm font-medium">Cancelar</button>
                    </div>
                    
                    <form id="mailboxForm" class="space-y-6">
                        <input type="hidden" id="mb-id" value="0">
                        <div class="grid grid-cols-2 gap-6">
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Nombre Remitente</label><input type="text" id="mb-name" required class="w-full border rounded px-3 py-2 text-sm focus:border-[#001128] focus:outline-none"></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label><input type="email" id="mb-email" required class="w-full border rounded px-3 py-2 text-sm focus:border-[#001128] focus:outline-none"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-8">
                            <div class="bg-gray-50 p-4 rounded border">
                                <h3 class="font-bold text-gray-800 mb-3">IMAP (Entrada)</h3>
                                <div class="space-y-3">
                                    <input type="text" id="mb-imap-host" required placeholder="Host" class="w-full border rounded px-2 py-1 text-sm">
                                    <div class="grid grid-cols-2 gap-3">
                                        <input type="number" id="mb-imap-port" value="993" required class="w-full border rounded px-2 py-1 text-sm">
                                        <select id="mb-protocol" class="w-full border rounded px-2 py-1 text-sm bg-white"><option value="IMAP">IMAP</option><option value="POP3">POP3</option></select>
                                    </div>
                                    <input type="text" id="mb-imap-user" required placeholder="Usuario" class="w-full border rounded px-2 py-1 text-sm">
                                    <input type="password" id="mb-imap-pass" required placeholder="Contraseña" class="w-full border rounded px-2 py-1 text-sm">
                                </div>
                            </div>
                            <div class="bg-gray-50 p-4 rounded border">
                                <h3 class="font-bold text-gray-800 mb-3">SMTP (Salida)</h3>
                                <div class="space-y-3">
                                    <input type="text" id="mb-smtp-host" required placeholder="Host" class="w-full border rounded px-2 py-1 text-sm">
                                    <input type="number" id="mb-smtp-port" value="465" required class="w-full border rounded px-2 py-1 text-sm">
                                    <input type="text" id="mb-smtp-user" required placeholder="Usuario" class="w-full border rounded px-2 py-1 text-sm">
                                    <input type="password" id="mb-smtp-pass" required placeholder="Contraseña" class="w-full border rounded px-2 py-1 text-sm">
                                </div>
                            </div>
                        </div>
                        <div id="form-msg" class="hidden p-3 rounded text-sm font-medium"></div>
                        <div class="flex justify-end pt-4 border-t mt-6">
                            <button type="submit" class="bg-[#001128] hover:bg-black text-white px-6 py-2 rounded font-bold transition">Guardar Configuración</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentMailboxId = 0;
        let currentMailboxName = '';
        let currentTicketId = 0;
        let currentTickets = [];
        let currentTicketTab = 'OPEN'; 
        let currentSearchQuery = '';

        function handleSearch(e) {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query.length > 0) {
                    currentMailboxId = 0;
                    currentSearchQuery = query;
                    currentMailboxName = 'Búsqueda: ' + query;
                    currentTicketTab = 'OPEN';
                    setTicketTab('OPEN');
                    switchView('tickets');
                } else {
                    currentSearchQuery = '';
                    switchView('mailboxes');
                }
            }
        }
        
        function toggleUserMenu() {
            document.getElementById('user-menu').classList.toggle('hidden');
        }

        window.addEventListener('click', function(e) {
            const menu = document.getElementById('user-menu');
            const avatar = e.target.closest('div[onclick="toggleUserMenu()"]');
            if (!avatar && menu && !menu.classList.contains('hidden')) {
                menu.classList.add('hidden');
            }
        });

        function goBack() {
            if (!document.getElementById('view-single-ticket').classList.contains('hidden')) {
                switchView('tickets');
            } else if (!document.getElementById('view-tickets').classList.contains('hidden')) {
                currentSearchQuery = '';
                document.getElementById('global-search').value = '';
                switchView('mailboxes');
            }
        }

        function switchView(view) {
            document.getElementById('view-mailboxes').classList.add('hidden');
            document.getElementById('view-tickets').classList.add('hidden');
            document.getElementById('view-single-ticket').classList.add('hidden');
            document.getElementById('view-settings').classList.add('hidden');
            
            document.getElementById('nav-mailboxes').className = "w-full text-left py-3 px-4 rounded transition duration-200 text-gray-400 hover:text-white hover:bg-white/5";
            document.getElementById('nav-settings').className = "w-full text-left py-3 px-4 rounded transition duration-200 text-gray-400 hover:text-white hover:bg-white/5";

            const btnBack = document.getElementById('btn-back');

            if(view === 'mailboxes') {
                document.getElementById('view-mailboxes').classList.remove('hidden');
                document.getElementById('nav-mailboxes').className = "w-full text-left py-3 px-4 rounded transition duration-200 bg-white/10 text-white font-semibold hover:bg-white/20";
                document.getElementById('page-title').innerText = "Resumen de Bandejas";
                btnBack.classList.add('hidden'); 
                loadMailboxCards();

            } else if(view === 'tickets') {
                document.getElementById('view-tickets').classList.remove('hidden');
                document.getElementById('nav-mailboxes').className = "w-full text-left py-3 px-4 rounded transition duration-200 bg-white/10 text-white font-semibold hover:bg-white/20";
                document.getElementById('page-title').innerText = "Tickets: " + currentMailboxName; 
                btnBack.classList.remove('hidden'); 
                loadTickets(currentMailboxId);

            } else if(view === 'single-ticket') {
                document.getElementById('view-single-ticket').classList.remove('hidden');
                document.getElementById('nav-mailboxes').className = "w-full text-left py-3 px-4 rounded transition duration-200 bg-white/10 text-white font-semibold hover:bg-white/20";
                document.getElementById('page-title').innerText = "Conversación"; 
                btnBack.classList.remove('hidden'); 

            } else if(view === 'settings') {
                document.getElementById('view-settings').classList.remove('hidden');
                document.getElementById('nav-settings').className = "w-full text-left py-3 px-4 rounded transition duration-200 bg-white/10 text-white font-semibold hover:bg-white/20";
                document.getElementById('page-title').innerText = "Configuración del Sistema";
                btnBack.classList.add('hidden');
                hideMailboxForm(); 
                loadSettingsMailboxes();
            }
        }

        async function loadMailboxCards() {
            const grid = document.getElementById('mailboxes-grid');
            grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10">Cargando bandejas...</div>';
            try {
                const response = await fetch('/api/mailboxes/list.php');
                const result = await response.json();
                if (result.success) {
                    if (result.mailboxes.length === 0) { grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10 bg-white rounded-lg border">No tienes bandejas conectadas.</div>'; return; }
                    let html = '';
                    result.mailboxes.forEach(mb => {
                        const badgeColor = mb.pending_count > 0 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700';
                        html += `
                            <div onclick="openMailboxTickets(${mb.id}, '${mb.name}')" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 hover:shadow-md hover:border-[#001128] transition cursor-pointer flex flex-col justify-between h-40 group">
                                <div><h3 class="font-bold text-xl text-[#001128] group-hover:text-blue-600 transition">${mb.name}</h3><p class="text-sm text-gray-500 mt-1">${mb.email}</p></div>
                                <div class="flex justify-between items-end"><span class="text-sm font-medium text-gray-500">Pendientes</span><span class="${badgeColor} text-lg font-bold px-3 py-1 rounded-full">${mb.pending_count}</span></div>
                            </div>`;
                    });
                    grid.innerHTML = html;
                }
            } catch (error) { grid.innerHTML = '<div class="col-span-full text-center text-red-500 py-10">Error de conexión.</div>';}
        }

        function openMailboxTickets(id, name) { 
            currentMailboxId = id; 
            currentMailboxName = name; 
            currentSearchQuery = ''; 
            document.getElementById('global-search').value = ''; 
            currentTicketTab = 'OPEN'; 
            setTicketTab('OPEN');      
            switchView('tickets'); 
        }

        async function loadTickets(mailboxId) {
            const listEl = document.getElementById('tickets-list');
            listEl.innerHTML = '<li class="p-8 text-center text-gray-500">Cargando correos...</li>';
            document.getElementById('count-open').innerText = '...';
            document.getElementById('count-closed').innerText = '...';

            let url = '/api/tickets/list.php?mailbox_id=' + mailboxId;
            if (currentSearchQuery !== '') {
                url += '&search=' + encodeURIComponent(currentSearchQuery);
            }

            try {
                const response = await fetch(url);
                const result = await response.json();
                if(result.success) {
                    currentTickets = result.tickets;
                    renderTickets();
                }
            } catch (error) { listEl.innerHTML = '<li class="p-8 text-center text-red-500">Error de conexión con el servidor.</li>'; }
        }

        function setTicketTab(tab) {
            currentTicketTab = tab;
            const tabOpen = document.getElementById('tab-open');
            const tabClosed = document.getElementById('tab-closed');
            
            if(tab === 'OPEN') {
                tabOpen.className = "py-3 px-6 font-bold text-[#001128] border-b-2 border-[#001128] transition-colors focus:outline-none";
                tabClosed.className = "py-3 px-6 font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition-colors focus:outline-none";
            } else {
                tabClosed.className = "py-3 px-6 font-bold text-[#001128] border-b-2 border-[#001128] transition-colors focus:outline-none";
                tabOpen.className = "py-3 px-6 font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition-colors focus:outline-none";
            }
            if(currentTickets.length > 0 || document.getElementById('count-open').innerText !== '...') {
                renderTickets();
            }
        }

        function renderTickets() {
            const listEl = document.getElementById('tickets-list');
            const openTickets = currentTickets.filter(t => t.status === 'OPEN');
            const closedTickets = currentTickets.filter(t => t.status === 'CLOSED');
            
            document.getElementById('count-open').innerText = openTickets.length;
            document.getElementById('count-closed').innerText = closedTickets.length;
            
            const ticketsToShow = currentTicketTab === 'OPEN' ? openTickets : closedTickets;
            
            if(ticketsToShow.length === 0) {
                const emptyMsg = currentTicketTab === 'OPEN' ? 'No hay tickets abiertos. ¡Todo al día! 🎉' : 'No hay tickets cerrados aún.';
                listEl.innerHTML = `<li class="p-8 text-center text-gray-500">${emptyMsg}</li>`;
                return;
            }

            let html = '';
            ticketsToShow.forEach(ticket => {
                const date = new Date(ticket.updated_at).toLocaleString();
                const snippet = ticket.snippet ? ticket.snippet.substring(0, 100) + '...' : 'Sin contenido...';
                const statusColor = ticket.status === 'OPEN' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800';
                
                // CAMBIO: Prioridad al customer_name
                const displayName = ticket.customer_name || ticket.customer_email;

                html += `
                    <li class="hover:bg-gray-50 transition cursor-pointer" onclick="openTicket(${ticket.id})">
                        <div class="px-6 py-5 flex items-center justify-between">
                            <div class="min-w-0 flex-1">
                                <div class="flex items-center justify-between mb-1">
                                    <p class="text-sm font-bold text-[#001128] truncate">${displayName}</p>
                                    <p class="text-xs text-gray-500 ml-2">${date}</p>
                                </div>
                                <div class="flex items-center justify-between">
                                    <p class="text-sm text-gray-800 font-semibold truncate">${ticket.subject}</p>
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${statusColor}">${ticket.status === 'OPEN' ? 'Abierto' : 'Cerrado'}</span>
                                </div>
                                <p class="text-sm text-gray-500 mt-1 truncate">${snippet}</p>
                            </div>
                        </div>
                    </li>`;
            });
            listEl.innerHTML = html;
        }

        async function openTicket(id) {
            currentTicketId = id;
            switchView('single-ticket');
            
            document.getElementById('ticket-subject').innerText = "Cargando...";
            document.getElementById('ticket-customer').innerText = "...";
            const messagesContainer = document.getElementById('ticket-messages');
            messagesContainer.innerHTML = '<div class="text-center text-gray-500 mt-10">Cargando mensajes...</div>';

            try {
                const response = await fetch('/api/tickets/get.php?id=' + id);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('ticket-subject').innerText = result.ticket.subject;
                    
                    // CAMBIO: Mostrar Nombre <Correo>
                    const customerDisplay = result.ticket.customer_name 
                        ? `${result.ticket.customer_name} <${result.ticket.customer_email}>` 
                        : result.ticket.customer_email;
                    document.getElementById('ticket-customer').innerText = customerDisplay;

                    let msgsHtml = '';
                    result.messages.forEach(msg => {
                        const date = new Date(msg.created_at).toLocaleString();
                        
                        let attachmentsHtml = '';
                        if (msg.attachments && msg.attachments.length > 0) {
                            let borderClass = msg.is_from_customer ? 'border-gray-200' : 'border-white/20';
                            let textClass = msg.is_from_customer ? 'text-gray-800 bg-gray-100 hover:bg-gray-200' : 'text-white bg-white/10 hover:bg-white/20';
                            
                            attachmentsHtml = `<div class="mt-4 pt-3 border-t ${borderClass} flex flex-wrap gap-2">`;
                            msg.attachments.forEach(att => {
                                attachmentsHtml += `
                                    <a href="${att.file_path}" target="_blank" download class="inline-flex items-center px-3 py-1.5 ${textClass} text-xs font-medium rounded-md transition shadow-sm">
                                        <svg class="w-4 h-4 mr-1.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                                        ${att.file_name}
                                    </a>`;
                            });
                            attachmentsHtml += '</div>';
                        }

                        if (msg.is_from_customer) {
                            const content = msg.body_html ? msg.body_html : `<pre class="whitespace-pre-wrap font-sans text-sm">${msg.body_text}</pre>`;
                            msgsHtml += `
                                <div class="flex flex-col max-w-3xl mr-auto mb-6">
                                    <span class="text-xs text-gray-500 mb-1 ml-1">Cliente - ${date}</span>
                                    <div class="bg-white border border-gray-200 p-5 rounded-2xl rounded-tl-sm shadow-sm text-gray-800">
                                        ${content}${attachmentsHtml}
                                    </div>
                                </div>`;
                        } else {
                            const content = msg.body_html ? msg.body_html : `<pre class="whitespace-pre-wrap font-sans text-sm text-white">${msg.body_text}</pre>`;
                            msgsHtml += `
                                <div class="flex flex-col max-w-3xl ml-auto mb-6 text-right">
                                    <span class="text-xs text-gray-500 mb-1 mr-1">Tú - ${date}</span>
                                    <div class="bg-[#001128] p-5 rounded-2xl rounded-tr-sm shadow-sm text-white text-left">
                                        ${content}${attachmentsHtml}
                                    </div>
                                </div>`;
                        }
                    });
                    messagesContainer.innerHTML = msgsHtml;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
            } catch (error) { messagesContainer.innerHTML = '<div class="text-center text-red-500 mt-10">Error al cargar el hilo.</div>'; }
        }

        async function sendReply(e) { 
            e.preventDefault(); 
            const btnSubmit = e.target.querySelector('button[type="submit"]');
            const originalBtnText = btnSubmit.innerHTML;
            const replyBody = document.getElementById('reply-body').value;
            const files = document.getElementById('reply-attachments').files;
            
            btnSubmit.innerHTML = 'Enviando... <svg class="animate-spin ml-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            btnSubmit.disabled = true;

            const formData = new FormData();
            formData.append('ticket_id', currentTicketId);
            formData.append('body', replyBody);
            for (let i = 0; i < files.length; i++) formData.append('attachments[]', files[i]);

            try {
                const response = await fetch('/api/tickets/reply.php', { method: 'POST', body: formData });
                const result = await response.json();
                if (response.ok && result.success) {
                    document.getElementById('reply-body').value = '';
                    document.getElementById('reply-attachments').value = ''; 
                    openTicket(currentTicketId); 
                } else { alert("Error: " + (result.message || "No se pudo enviar")); }
            } catch (error) { alert("Error de conexión."); } 
            finally { btnSubmit.innerHTML = originalBtnText; btnSubmit.disabled = false; }
        }

        async function closeTicket() {
            if(!confirm('¿Estás seguro de que deseas marcar este ticket como Cerrado?')) return;
            try {
                const response = await fetch('/api/tickets/close.php', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ticket_id: currentTicketId })
                });
                const result = await response.json();
                if(result.success) { switchView('tickets'); loadTickets(currentMailboxId); } 
                else { alert('Error al cerrar: ' + result.message); }
            } catch(e) { alert('Error de conexión'); }
        }

        async function loadSettingsMailboxes() {
            const listEl = document.getElementById('settings-mailboxes-list');
            try {
                const response = await fetch('/api/mailboxes/list.php');
                const result = await response.json();
                if (result.success) {
                    if (result.mailboxes.length === 0) { listEl.innerHTML = '<li class="py-4 text-center text-gray-500">No hay bandejas configuradas.</li>'; return; }
                    let html = '';
                    result.mailboxes.forEach(mb => {
                        html += `
                            <li class="py-4 flex items-center justify-between">
                                <div><p class="font-bold text-gray-800">${mb.name}</p><p class="text-sm text-gray-500">${mb.email}</p></div>
                                <button onclick="editMailbox(${mb.id})" class="text-[#001128] hover:text-blue-600 font-medium text-sm transition">Editar</button>
                            </li>`;
                    });
                    listEl.innerHTML = html;
                }
            } catch (error) {}
        }

        function showMailboxForm() {
            document.getElementById('settings-list').classList.add('hidden');
            document.getElementById('settings-form').classList.remove('hidden');
            document.getElementById('form-title').innerText = "Nueva Bandeja";
            document.getElementById('mailboxForm').reset();
            document.getElementById('mb-id').value = "0"; 
            document.getElementById('form-msg').classList.add('hidden');
        }

        function hideMailboxForm() {
            document.getElementById('settings-form').classList.add('hidden');
            document.getElementById('settings-list').classList.remove('hidden');
        }

        async function editMailbox(id) {
            try {
                const response = await fetch('/api/mailboxes/get.php?id=' + id);
                const result = await response.json();
                if (result.success) {
                    const mb = result.mailbox;
                    document.getElementById('mb-id').value = mb.id;
                    document.getElementById('mb-name').value = mb.name;
                    document.getElementById('mb-email').value = mb.email;
                    document.getElementById('mb-protocol').value = mb.protocol;
                    document.getElementById('mb-imap-host').value = mb.mail_host;
                    document.getElementById('mb-imap-port').value = mb.mail_port;
                    document.getElementById('mb-imap-user').value = mb.mail_user;
                    document.getElementById('mb-imap-pass').value = mb.mail_pass;
                    document.getElementById('mb-smtp-host').value = mb.smtp_host;
                    document.getElementById('mb-smtp-port').value = mb.smtp_port;
                    document.getElementById('mb-smtp-user').value = mb.smtp_user;
                    document.getElementById('mb-smtp-pass').value = mb.smtp_pass;
                    
                    document.getElementById('settings-list').classList.add('hidden');
                    document.getElementById('settings-form').classList.remove('hidden');
                    document.getElementById('form-title').innerText = "Editar Bandeja";
                    document.getElementById('form-msg').classList.add('hidden');
                }
            } catch (error) { alert("Error al obtener datos"); }
        }

        document.getElementById('mailboxForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('form-msg');
            msgBox.className = "hidden p-3 rounded text-sm font-medium"; 
            
            const mbId = parseInt(document.getElementById('mb-id').value);
            const payload = {
                id: mbId,
                name: document.getElementById('mb-name').value, email: document.getElementById('mb-email').value, protocol: document.getElementById('mb-protocol').value,
                mail_host: document.getElementById('mb-imap-host').value, mail_port: document.getElementById('mb-imap-port').value, mail_user: document.getElementById('mb-imap-user').value, mail_pass: document.getElementById('mb-imap-pass').value,
                smtp_host: document.getElementById('mb-smtp-host').value, smtp_port: document.getElementById('mb-smtp-port').value, smtp_user: document.getElementById('mb-smtp-user').value, smtp_pass: document.getElementById('mb-smtp-pass').value
            };
            
            const apiUrl = mbId > 0 ? '/api/mailboxes/update.php' : '/api/mailboxes/create.php';

            try {
                const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const result = await response.json();
                if(response.ok && result.success) {
                    msgBox.innerText = result.message; msgBox.className = "p-3 rounded text-sm font-medium bg-green-100 text-green-700 block mt-4"; 
                    setTimeout(() => { hideMailboxForm(); loadSettingsMailboxes(); }, 1500);
                } else { msgBox.innerText = result.message || "Error al guardar"; msgBox.className = "p-3 rounded text-sm font-medium bg-red-100 text-red-700 block mt-4"; }
            } catch (err) { msgBox.innerText = "Error del servidor."; msgBox.className = "p-3 rounded text-sm font-medium bg-red-100 text-red-700 block mt-4"; }
        });

        async function logout() { await fetch('/api/auth/logout.php', { method: 'POST' }); window.location.href = '/login'; }
    </script>
</body>
