<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lean Helpdesk</title>
    <link rel="icon" type="image/png" href="/assets/logo-blanco.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96 border-t-4 border-[#001128]">
        
        <div class="flex justify-center mb-6">
            <img src="/assets/logo.png" alt="Logo Helpdesk" class="h-16 object-contain">
        </div>
        
        <h2 class="text-xl font-bold mb-6 text-center text-black">Acceso al Panel</h2>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-black text-sm font-bold mb-2" for="email">Email</label>
                <input class="shadow appearance-none border border-gray-300 rounded w-full py-2 px-3 text-black leading-tight focus:outline-none focus:ring-2 focus:ring-[#001128] focus:border-transparent" id="email" type="email" required placeholder="camilo@masacademy.io">
            </div>
            
            <div class="mb-6">
                <label class="block text-black text-sm font-bold mb-2" for="password">Contraseña</label>
                <input class="shadow appearance-none border border-gray-300 rounded w-full py-2 px-3 text-black mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-[#001128] focus:border-transparent" id="password" type="password" required placeholder="********">
            </div>
            
            <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm" role="alert">
                <span class="block sm:inline" id="error-text"></span>
            </div>

            <button class="bg-[#001128] hover:bg-black text-white font-bold py-2 px-4 rounded w-full focus:outline-none focus:shadow-outline transition duration-200" type="submit">
                Entrar
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            try {
                const response = await fetch('/api/auth/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    window.location.href = '/'; 
                } else {
                    errorText.innerText = result.message || 'Error al iniciar sesión';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorText.innerText = 'Error de conexión con el servidor.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
